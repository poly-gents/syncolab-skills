name: Discover capability & request access
version: 1.0.0
type: procedural
description:
  capability: Inspect your current tools, browse the PolyGents catalog for a capability you might be missing, and ask a human admin to file a support ticket so PolyGents support can grant the missing tool/skill. The actual ticket-creation step requires explicit human-in-the-loop approval and lands in the internal Help & Support system under the `agent-capability-request` category.
  trigger_conditions: Use when the initiative has opted in to this automated flow.
  scope_boundaries: Follow platform tools only; do not bypass opt-in gates or human approval prompts.
  key_domain_words:
  - discover-capability-and-request-access
tags:
  - discover-capability-and-request-access
