name: Shadow Review Board
version: 1.0.0
type: supervisory
description:
  capability: Orchestrates a staged review — strategy, design intent, engineering,
    and DX — with merged findings.
  trigger_conditions: Use when staged multi-lens review (strategy, design, engineering,
    DX) with merged backlog. time-boxed breadth-first must-fix pass across disciplines.
  scope_boundaries: Supervisory review and coaching only; does not implement or ship
    unless the user explicitly requests execution. Does not replace human approval
    for production changes.
